<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админка</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; border-radius: 12px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: left; }
        button { background: #f59e0b; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; margin: 2px; }
        .delete-btn { background: #dc2626; color: white; }
        .add-form { margin-bottom: 30px; padding: 20px; background: #f8fafc; border-radius: 12px; }
        .add-form input, .add-form select { margin: 5px; padding: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Админ-панель</h1>
    <div id="adminCheck">Проверка прав...</div>

    <div class="add-form">
        <h3>Добавить товар</h3>
        <input type="text" id="prodName" placeholder="Название">
        <input type="text" id="prodSku" placeholder="SKU">
        <input type="number" id="prodPrice" placeholder="Цена">
        <input type="text" id="prodUnit" placeholder="Ед. изм (л/кг/шт)">
        <input type="number" id="prodStock" placeholder="Количество">
        <input type="text" id="prodBrand" placeholder="Бренд">
        <select id="prodCategory">
            <option value="1">Топливо</option>
            <option value="2">Моторные масла</option>
            <option value="3">Смазки</option>
        </select>
        <button id="addProductBtn">Добавить</button>
    </div>

    <h2>Товары</h2>
    <div id="productsList">Загрузка...</div>

    <h2>Пользователи</h2>
    <div id="usersList">Загрузка...</div>

    <h2>Заказы</h2>
    <div id="ordersList">Загрузка...</div>

    <h2>Статистика</h2>
    <div id="stats">Загрузка...</div>
</div>
<script>
    const API = 'http://localhost:5000/api';
    function getToken() { return localStorage.getItem('token'); }

    async function checkAdmin() {
        const token = getToken();
        if(!token) { document.getElementById('adminCheck').innerHTML = '<span style="color:red">Вы не авторизованы. Войдите как admin@dioil.ru / admin123 на главной странице</span>'; return false; }
        const me = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
        if(me.role !== 'admin') { document.getElementById('adminCheck').innerHTML = '<span style="color:red">Нет прав администратора</span>'; return false; }
        document.getElementById('adminCheck').innerHTML = '<span style="color:green">Вы вошли как администратор</span>';
        return true;
    }

    async function loadProducts() {
        const token = getToken();
        const res = await fetch(`${API}/products`);
        const prods = await res.json();
        const html = `<table><tr><th>ID</th><th>Название</th><th>Цена</th><th>Остаток</th><th>Действия</th></tr>` +
            prods.map(p => `<tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>${p.price}</td>
                <td>${p.stock_quantity}</td>
                <td><button onclick="editProduct(${p.id})">Редактировать</button> <button class="delete-btn" onclick="deleteProduct(${p.id})">Удалить</button></td>
            </tr>`).join('') + `</table>`;
        document.getElementById('productsList').innerHTML = html;
    }

    window.editProduct = (id) => {
        const newName = prompt('Новое название');
        if(newName) alert('Редактирование через API – упрощённо. В реальном проекте сделать форму.');
        // Для теста можно вызвать PUT, но опустим для краткости, но логика есть.
    };
    window.deleteProduct = async (id) => {
        if(!confirm('Удалить товар?')) return;
        const token = getToken();
        await fetch(`${API}/admin/products/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        loadProducts();
    };

    document.getElementById('addProductBtn').onclick = async () => {
        const token = getToken();
        const product = {
            name: document.getElementById('prodName').value,
            sku: document.getElementById('prodSku').value,
            price: parseFloat(document.getElementById('prodPrice').value),
            unit: document.getElementById('prodUnit').value,
            stockQuantity: parseInt(document.getElementById('prodStock').value),
            brand: document.getElementById('prodBrand').value,
            categoryId: parseInt(document.getElementById('prodCategory').value),
            description: '',
            image: ''
        };
        const res = await fetch(`${API}/admin/products`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify(product) });
        if(res.ok) { alert('Товар добавлен'); loadProducts(); }
        else alert('Ошибка');
    };

    async function loadUsers() {
        const token = getToken();
        const res = await fetch(`${API}/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });
        const users = await res.json();
        const html = `<table><tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th><th>Действия</th></tr>` +
            users.map(u => `<tr>
                <td>${u.id}</td>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>${u.role}</td>
                <td><button onclick="deleteUser(${u.id})" class="delete-btn">Удалить</button></td>
            </tr>`).join('') + `</table>`;
        document.getElementById('usersList').innerHTML = html;
    }
    window.deleteUser = async (id) => {
        if(!confirm('Удалить пользователя?')) return;
        const token = getToken();
        await fetch(`${API}/admin/users/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        loadUsers();
    };

    async function loadOrders() {
        const token = getToken();
        const res = await fetch(`${API}/admin/orders`, { headers: { 'Authorization': `Bearer ${token}` } });
        const orders = await res.json();
        const html = `<table><tr><th>ID</th><th>Пользователь</th><th>Сумма</th><th>Статус</th><th>Действия</th></tr>` +
            orders.map(o => `<tr>
                <td>${o.id}</td>
                <td>${o.user_name || 'Гость'} (${o.user_email})</td>
                <td>${o.total}</td>
                <td>${o.status}</td>
                <td><select onchange="changeStatus(${o.id}, this.value)">
                    <option value="pending">pending</option>
                    <option value="processing">processing</option>
                    <option value="delivered">delivered</option>
                    <option value="cancelled">cancelled</option>
                </select></td>
            </tr>`).join('') + `</table>`;
        document.getElementById('ordersList').innerHTML = html;
    }
    window.changeStatus = async (orderId, status) => {
        const token = getToken();
        await fetch(`${API}/admin/orders/${orderId}/status`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ status }) });
        loadOrders();
    };

    async function loadStats() {
        const token = getToken();
        const res = await fetch(`${API}/admin/stats`, { headers: { 'Authorization': `Bearer ${token}` } });
        const stats = await res.json();
        document.getElementById('stats').innerHTML = `<p>Товаров: ${stats.products} | Заказов: ${stats.orders} | Выручка: ${stats.revenue} ₽ | Пользователей: ${stats.users}</p>`;
    }

    checkAdmin().then(isAdmin => {
        if(isAdmin) {
            loadProducts();
            loadUsers();
            loadOrders();
            loadStats();
        }
    });
</script>
</body>
</html>
